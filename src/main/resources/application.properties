server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:web_ban_sach}}
spring.datasource.username=${DB_USERNAME:${DB_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:}}

# Hibernate validates schema but does NOT modify it
spring.jpa.hibernate.ddl-auto=validate

# Flyway migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.connect-retries=${FLYWAY_CONNECT_RETRIES:10}
spring.flyway.connect-retries-interval=${FLYWAY_CONNECT_RETRIES_INTERVAL:5}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary
cloudinary.url=${CLOUDINARY_URL:}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Browser-facing frontend origin and VNPay redirect target
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:}
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
