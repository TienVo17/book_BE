spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/web_ban_sach}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate validates schema but does NOT modify it
spring.jpa.hibernate.ddl-auto=validate

# Flyway migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
jwt.secret=${JWT_SECRET:U29tZVZlcnlMb25nU2VjdXJlS2V5VGhhdFNhdGlzZmllczMyQnl0ZXM=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary
cloudinary.url=${CLOUDINARY_URL:}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Frontend URL (for SEO canonical links)
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
